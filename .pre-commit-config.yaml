repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: [--desc, "on", --skip-editable, --ignore-vuln, GHSA-5239-wwwm-4pmq]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # Note: pytest runs are handled by CI (requires Python 3.11+).
  # Running them in pre-commit causes failures on machines with older system Python.
