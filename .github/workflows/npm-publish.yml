name: Publish to npm

# Triggers when a GitHub Release is published (same trigger as PyPI publish).
# Both publish.yml (PyPI) and npm-publish.yml (npm) fire together so the
# Python and JS packages stay in sync.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish openwebgoggles to npm
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}, Version: ${VERSION}"

      - name: Verify package.json version matches tag
        working-directory: assets/sdk
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match package.json version (${PKG_VERSION})"
            exit 1
          fi
          echo "Version check passed: ${PKG_VERSION}"

      - name: Publish to npm
        working-directory: assets/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
