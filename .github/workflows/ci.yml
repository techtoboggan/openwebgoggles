name: CI

on:
  push:
    branches: [main, next-version]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check scripts/

      - name: Audit dependencies
        run: |
          pip install pip-audit
          # CVE-2026-4539: ReDoS in pygments AdlLexer (local-access only, no patch yet).
          # pygments is a transitive dep via mcp→rich; remove ignore when pygments 2.20+ is released.
          pip-audit --desc on --skip-editable --ignore-vuln CVE-2026-4539

      - name: Run tests with coverage
        run: python -m pytest scripts/tests/ -v --cov=scripts --cov-report=term --cov-fail-under=80 -m "not slow"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E browser tests
        run: python -m pytest scripts/tests/test_browser_e2e.py -v -m slow --timeout=120

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check scripts/

      - name: Lint
        run: ruff check scripts/

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline

  js-lint:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install --global eslint@8

      - name: Lint dynamic app JS
        run: eslint assets/apps/dynamic/ --ext .js

      - name: Lint SDK JS
        run: eslint assets/sdk/openwebgoggles-sdk.js
