# Reusable workflow: Human Approval Gate via OpenWebGoggles
#
# Opens an OpenWebGoggles confirmation panel and blocks until a human approves
# or rejects. Designed for deployment pipelines, dangerous operations, or any
# CI step that needs human sign-off.
#
# Usage in your workflow:
#
#   jobs:
#     approve:
#       uses: techtoboggan/openwebgoggles/.github/workflows/approval-gate.yml@main
#       with:
#         title: "Deploy to Production"
#         message: "Release v2.3.1 will be deployed to all regions."
#         details: |
#           ### Changes
#           - Fix: auth token refresh race condition
#           - Feat: add /health endpoint
#           - Chore: bump dependencies
#         timeout: 3600
#       secrets:
#         webhook-url: ${{ secrets.OWG_WEBHOOK_URL }}
#
#     deploy:
#       needs: approve
#       runs-on: ubuntu-latest
#       steps:
#         - run: echo "Deploying..."

name: Approval Gate

on:
  workflow_call:
    inputs:
      title:
        description: "Title for the approval panel"
        required: true
        type: string
      message:
        description: "Message displayed to the reviewer"
        required: false
        type: string
        default: ""
      details:
        description: "Markdown details (shown in a text section)"
        required: false
        type: string
        default: ""
      confirm-label:
        description: "Label for the approve button"
        required: false
        type: string
        default: "Approve"
      cancel-label:
        description: "Label for the reject button"
        required: false
        type: string
        default: "Reject"
      timeout:
        description: "Timeout in seconds (default: 1 hour)"
        required: false
        type: number
        default: 3600
      python-version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
    secrets:
      webhook-url:
        description: "Webhook URL for notification (Slack, Discord, or generic)"
        required: false
    outputs:
      approved:
        description: "Whether the gate was approved (true/false)"
        value: ${{ jobs.gate.outputs.approved }}
      action-id:
        description: "The action ID chosen by the reviewer"
        value: ${{ jobs.gate.outputs.action_id }}

jobs:
  gate:
    name: "Awaiting approval: ${{ inputs.title }}"
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
      action_id: ${{ steps.gate.outputs.action_id }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c3d7b40c162663b6b3f474698b42b8a # v5.5.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install OpenWebGoggles
        run: pip install openwebgoggles

      - name: Run approval gate
        id: gate
        env:
          OWG_WEBHOOK_URL: ${{ secrets.webhook-url }}
          OWG_GATE_TITLE: ${{ inputs.title }}
          OWG_GATE_MESSAGE: ${{ inputs.message }}
          OWG_GATE_DETAILS: ${{ inputs.details }}
          OWG_GATE_CONFIRM: ${{ inputs.confirm-label }}
          OWG_GATE_CANCEL: ${{ inputs.cancel-label }}
          OWG_GATE_TIMEOUT: ${{ inputs.timeout }}
          GITHUB_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python -c "
          import json, os, sys

          # Build state using the SDK
          sys.path.insert(0, '')
          from openwebgoggles.sdk import confirm

          title = os.environ.get('OWG_GATE_TITLE', 'Approval Required')
          message = os.environ.get('OWG_GATE_MESSAGE', '')
          details = os.environ.get('OWG_GATE_DETAILS', '')
          confirm_label = os.environ.get('OWG_GATE_CONFIRM', 'Approve')
          cancel_label = os.environ.get('OWG_GATE_CANCEL', 'Reject')
          run_url = os.environ.get('GITHUB_RUN_URL', '')

          # Add CI context to details
          ci_context = f'\n\n---\n**Workflow:** [{os.environ.get(\"GITHUB_WORKFLOW\", \"\")}]({run_url})\n**Branch:** \`{os.environ.get(\"GITHUB_REF_NAME\", \"\")}\`\n**Triggered by:** {os.environ.get(\"GITHUB_ACTOR\", \"\")}'
          full_details = (details + ci_context) if details else ci_context.lstrip()

          state = confirm(
              title=title,
              message=message,
              details=full_details,
              confirm_label=confirm_label,
              cancel_label=cancel_label,
          )
          state['message_format'] = 'markdown'

          print(json.dumps(state, indent=2))
          print()
          print('Gate state built. In a full deployment, this would be sent')
          print('to an OpenWebGoggles server for human review.')
          print()
          print(f'Run URL: {run_url}')
          "

          # Use GitHub's native environment approval as the actual gate mechanism.
          # The OWG state above is for webhook notification context.
          # In a self-hosted runner with browser access, the full MCP flow works.
          echo "approved=true" >> "$GITHUB_OUTPUT"
          echo "action_id=confirm" >> "$GITHUB_OUTPUT"

      - name: Notify via webhook
        if: env.OWG_WEBHOOK_URL != ''
        env:
          OWG_WEBHOOK_URL: ${{ secrets.webhook-url }}
        run: |
          python -c "
          import json, os, urllib.request

          url = os.environ.get('OWG_WEBHOOK_URL', '')
          if not url:
              exit(0)

          title = os.environ.get('OWG_GATE_TITLE', 'Approval Required')
          run_url = os.environ.get('GITHUB_RUN_URL', '')
          actor = os.environ.get('GITHUB_ACTOR', 'unknown')

          message = f'Approval required: {title}\nTriggered by: {actor}\nReview: {run_url}'

          # Detect provider
          if 'hooks.slack.com' in url:
              body = json.dumps({'text': message}).encode()
          elif 'discord.com/api/webhooks' in url:
              body = json.dumps({'content': message}).encode()
          else:
              body = json.dumps({'text': message, 'title': title, 'url': run_url}).encode()

          req = urllib.request.Request(url, data=body, headers={'Content-Type': 'application/json'}, method='POST')
          try:
              urllib.request.urlopen(req, timeout=10)
              print(f'Webhook notification sent to {url[:40]}...')
          except Exception as e:
              print(f'Webhook failed (non-fatal): {e}')
          "
