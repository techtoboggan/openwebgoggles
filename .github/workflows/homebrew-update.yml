name: Update Homebrew Tap

# Triggers when a new GitHub Release is published (same as PyPI + npm + Docker).
# Computes the new source tarball SHA256 and opens a PR against
# techtoboggan/homebrew-tap to bump Formula/openwebgoggles.rb.
#
# Requires a repository secret: HOMEBREW_TAP_TOKEN
#   A personal access token (classic) with `repo` scope on techtoboggan/homebrew-tap,
#   OR a fine-grained token with "Contents: write" and "Pull requests: write" on that repo.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-tap:
    name: Bump Homebrew formula in techtoboggan/homebrew-tap
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://files.pythonhosted.org/packages/source/o/openwebgoggles/openwebgoggles-${VERSION}.tar.gz"
          # Retry up to 5 times (PyPI publish may not be instant)
          for i in $(seq 1 5); do
            if curl -fsSL "$URL" -o /tmp/owg.tar.gz; then
              break
            fi
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          SHA256=$(sha256sum /tmp/owg.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Check out techtoboggan/homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: techtoboggan/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          URL="${{ steps.sha256.outputs.url }}"
          FORMULA="homebrew-tap/Formula/openwebgoggles.rb"

          # Copy the reference formula from this repo
          cp Formula/openwebgoggles.rb "$FORMULA"

          # Substitute version, URL, and SHA256 placeholders
          sed -i "s|openwebgoggles-0\.[0-9]*\.[0-9]*\.tar\.gz|openwebgoggles-${VERSION}.tar.gz|g" "$FORMULA"
          sed -i "s|PLACEHOLDER_SHA256_UPDATED_BY_WORKFLOW|${SHA256}|g" "$FORMULA"

      - name: Open pull request against the tap
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1f451bfff  # v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
          commit-message: "openwebgoggles ${{ steps.version.outputs.version }}"
          branch: "bump/openwebgoggles-${{ steps.version.outputs.version }}"
          title: "Bump openwebgoggles to ${{ steps.version.outputs.version }}"
          body: |
            Auto-generated by the `homebrew-update` workflow in
            [techtoboggan/openwebgoggles](https://github.com/techtoboggan/openwebgoggles).

            **Changes:**
            - Version: `${{ steps.version.outputs.version }}`
            - URL: `${{ steps.sha256.outputs.url }}`
            - SHA256: `${{ steps.sha256.outputs.sha256 }}`

            Please review the formula, merge, and then run `brew audit --new Formula/openwebgoggles.rb`
            to verify the bottle can be built.
          labels: "automated,homebrew"
